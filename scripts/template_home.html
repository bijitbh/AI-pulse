<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Pulse — AI News by Section</title>
  <style>
    :root {
      --bg:           #0d0f14;
      --surface:      #161b27;
      --surface-hover:#1e2535;
      --border:       #2a3248;
      --text:         #e2e8f0;
      --text-muted:   #8896b0;
      --accent:       #4f8ef7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      background: linear-gradient(180deg, #0a0d18 0%, var(--bg) 100%);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }

    .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .logo .tagline { font-size: 11px; color: var(--text-muted); }

    .last-updated { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .last-updated span { color: var(--text); font-weight: 500; }

    /* ── Main Grid ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .page-intro {
      margin-bottom: 32px;
    }

    .page-intro h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    /* ── Section Card ── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--c, var(--accent));
      border-radius: 14px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s, background 0.2s;
    }

    .section-card:hover {
      background: var(--surface-hover);
      border-color: var(--c, var(--accent));
    }

    .section-card-top { display: flex; flex-direction: column; gap: 4px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--c, var(--accent));
      flex-shrink: 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .section-desc {
      font-size: 12px;
      color: var(--text-muted);
      padding-left: 16px;
    }

    /* ── Story List ── */
    .story-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .story-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .story-rank {
      font-size: 11px;
      font-weight: 700;
      color: var(--c, var(--accent));
      opacity: 0.7;
      flex-shrink: 0;
      margin-top: 3px;
      font-variant-numeric: tabular-nums;
      min-width: 18px;
    }

    .story-body { flex: 1; min-width: 0; }

    .story-headline {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 3px;
    }

    .story-headline a {
      color: var(--text);
      transition: color 0.15s;
    }

    .story-headline a:hover {
      color: var(--c, var(--accent));
      text-decoration: none;
    }

    .story-short {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── View All Link ── */
    .view-all-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--c, var(--accent));
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 0 0;
      border-top: 1px solid var(--border);
      transition: opacity 0.15s;
    }

    .view-all-link:hover { opacity: 0.75; text-decoration: none; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sections-grid { grid-template-columns: 1fr; }
      .header-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>AI Pulse</h1>
          <div class="tagline">AI news by section — curated by Claude</div>
        </div>
      </div>
      <div class="last-updated">Last updated: <span>{{LAST_UPDATED}}</span></div>
    </div>
  </header>

  <main>
    <div class="page-intro">
      <h2>6 Sections · 5 Stories Each · Click any story to read more</h2>
    </div>
    <div class="sections-grid">
      {{SECTIONS_HTML}}
    </div>
  </main>

  <footer>AI Pulse &mdash; Powered by Claude &amp; GitHub Actions &mdash; Refreshed every 15 days</footer>

</body>
</html>
