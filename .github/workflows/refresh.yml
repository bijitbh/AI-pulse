name: Refresh AI Pulse

on:
  schedule:
    - cron: '0 6 1,16 * *'  # 6 AM UTC on the 1st and 16th (~every 15 days)
  workflow_dispatch:          # Also allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and push updated site
        run: |
          git config user.name  "AI Pulse Bot"
          git config user.email "ai-pulse-bot@users.noreply.github.com"
          git add index.html pages/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: refresh AI news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin ${{ github.ref_name }}
