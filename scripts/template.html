<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Pulse — Top 10 AI News</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161b27;
      --surface-hover: #1e2535;
      --border: #2a3248;
      --accent: #4f8ef7;
      --accent-dim: #2d5ab8;
      --text: #e2e8f0;
      --text-muted: #8896b0;
      --tag-eng: #1a3a2a;
      --tag-eng-text: #4ade80;
      --tag-fin: #1a2e3a;
      --tag-fin-text: #38bdf8;
      --tag-ai: #2a1a3a;
      --tag-ai-text: #c084fc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 0 20px;
      background: linear-gradient(180deg, #0a0d18 0%, var(--bg) 100%);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .logo .tagline { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .last-updated { font-size: 12px; color: var(--text-muted); }
    .last-updated span { color: var(--text); font-weight: 500; }

    main { max-width: 900px; margin: 0 auto; padding: 32px 24px 64px; }

    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .section-header h2 { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .section-header .divider { flex: 1; height: 1px; background: var(--border); }

    .news-list { display: flex; flex-direction: column; gap: 16px; }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .news-card:hover {
      border-color: var(--accent-dim);
      background: var(--surface-hover);
    }

    .card-rank {
      position: absolute; top: 20px; right: 20px;
      font-size: 28px; font-weight: 800;
      color: var(--border); line-height: 1; user-select: none;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

    .tag {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .tag-engineering { background: var(--tag-eng); color: var(--tag-eng-text); }
    .tag-finance     { background: var(--tag-fin); color: var(--tag-fin-text); }
    .tag-ai          { background: var(--tag-ai);  color: var(--tag-ai-text);  }

    .card-headline { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; padding-right: 40px; }
    .card-headline a { color: var(--text); }
    .card-headline a:hover { color: var(--accent); text-decoration: none; }

    .card-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; display: flex; gap: 12px; flex-wrap: wrap; }
    .card-meta .source { font-weight: 600; color: var(--accent); }

    .card-summary { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-bottom: 16px; }

    .card-takeaways h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }

    .card-takeaways ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .card-takeaways li { font-size: 13px; color: var(--text); padding-left: 18px; position: relative; line-height: 1.5; }
    .card-takeaways li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 12px; }

    footer {
      text-align: center; padding: 24px; font-size: 12px;
      color: var(--text-muted); border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .card-rank { font-size: 20px; top: 16px; right: 16px; }
      .news-card { padding: 18px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>AI Pulse</h1>
          <div class="tagline">Top 10 AI stories — curated by Claude</div>
        </div>
      </div>
      <div class="last-updated">
        Last updated: <span>{{LAST_UPDATED}}</span>
      </div>
    </div>
  </header>

  <main>
    <div class="section-header">
      <h2>Today's Top 10</h2>
      <div class="divider"></div>
    </div>
    <div class="news-list">
      {{NEWS_ITEMS}}
    </div>
  </main>

  <footer>AI Pulse &mdash; Powered by Claude &amp; GitHub Actions &mdash; Refreshed every 15 days</footer>

</body>
</html>
