name: Refresh AI Pulse

on:
  workflow_dispatch:  # Triggered manually via the website's Refresh button

permissions:
  contents: write   # needed to commit & push index.html

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate news
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          REFRESH_PASSWORD_HASH:  ${{ secrets.REFRESH_PASSWORD_HASH }}
          WORKFLOW_PAT:           ${{ secrets.WORKFLOW_PAT }}
          REPO_OWNER:             ${{ github.repository_owner }}
          REPO_NAME:              ${{ github.event.repository.name }}
          WORKFLOW_ID:            "refresh.yml"
          GITHUB_REF_NAME:        ${{ github.ref_name }}
        run: python scripts/generate_news.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "AI Pulse Bot"
          git config user.email "ai-pulse-bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: refresh AI news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin ${{ github.ref_name }}
