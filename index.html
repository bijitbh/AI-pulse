<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Pulse — Top 10 AI News</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161b27;
      --surface-hover: #1e2535;
      --border: #2a3248;
      --accent: #4f8ef7;
      --accent-dim: #2d5ab8;
      --text: #e2e8f0;
      --text-muted: #8896b0;
      --tag-eng: #1a3a2a;
      --tag-eng-text: #4ade80;
      --tag-fin: #1a2e3a;
      --tag-fin-text: #38bdf8;
      --tag-ai: #2a1a3a;
      --tag-ai-text: #c084fc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 0 20px;
      background: linear-gradient(180deg, #0a0d18 0%, var(--bg) 100%);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .logo .tagline { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .last-updated { font-size: 12px; color: var(--text-muted); }
    .last-updated span { color: var(--text); font-weight: 500; }

    main { max-width: 900px; margin: 0 auto; padding: 32px 24px 64px; }

    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .section-header h2 { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .section-header .divider { flex: 1; height: 1px; background: var(--border); }

    .empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; }

    footer {
      text-align: center; padding: 24px; font-size: 12px;
      color: var(--text-muted); border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>AI Pulse</h1>
          <div class="tagline">Top 10 AI stories — curated by Claude</div>
        </div>
      </div>
      <div class="last-updated">Last updated: <span>Not yet — first run pending</span></div>
    </div>
  </header>

  <main>
    <div class="section-header">
      <h2>Today's Top 10</h2>
      <div class="divider"></div>
    </div>
    <div class="empty-state">
      <div class="icon">⚡</div>
      <h3>No stories yet</h3>
      <p>The site will be populated on the next scheduled run (1st and 16th of each month).</p>
    </div>
  </main>

  <footer>AI Pulse &mdash; Powered by Claude &amp; GitHub Actions &mdash; Refreshed every 15 days</footer>

</body>
</html>
