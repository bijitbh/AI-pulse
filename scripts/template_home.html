<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Pulse — AI News by Section</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #0d0f14;
      --surface:      #161b27;
      --surface-hover:#1c2235;
      --border:       #2a3248;
      --text:         #e2e8f0;
      --text-muted:   #8896b0;
      --accent:       #4f8ef7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      background: rgba(13,15,20,0.85);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .logo h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo .tagline { font-size: 11px; color: var(--text-muted); }

    .last-updated { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .last-updated span { color: var(--text); font-weight: 600; }

    /* ── Hero ── */
    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .hero-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.8px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #e2e8f0 30%, #8896b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ── Main Grid ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    /* ── Section Card ── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .section-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Gradient header strip */
    .section-card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 20px 16px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--c) 15%, transparent), transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--c) 20%, var(--border));
    }

    .section-icon {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 2px;
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--c) 60%, transparent));
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .section-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Story List ── */
    .story-list {
      display: flex;
      flex-direction: column;
      padding: 14px 20px;
      gap: 14px;
      flex: 1;
    }

    .story-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .story-rank {
      font-size: 10px;
      font-weight: 800;
      color: var(--c, var(--accent));
      opacity: 0.6;
      flex-shrink: 0;
      margin-top: 3px;
      min-width: 16px;
      font-variant-numeric: tabular-nums;
    }

    .story-body { flex: 1; min-width: 0; }

    .story-headline {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 2px;
    }

    .story-headline a { color: var(--text); transition: color 0.15s; }
    .story-headline a:hover { color: var(--c, var(--accent)); text-decoration: none; }

    .story-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
    }

    .source-favicon {
      border-radius: 2px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    .story-meta span {
      font-size: 10px;
      color: var(--c, var(--accent));
      font-weight: 600;
      opacity: 0.8;
    }

    .story-short {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── View All ── */
    .view-all-link {
      font-size: 12px;
      font-weight: 700;
      color: var(--c, var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      transition: background 0.15s;
      letter-spacing: 0.2px;
    }

    .view-all-link:hover {
      background: color-mix(in srgb, var(--c) 8%, transparent);
      text-decoration: none;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .sections-grid { grid-template-columns: 1fr; }
      .hero-title { font-size: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>AI Pulse</h1>
          <div class="tagline">AI news by section — curated by Claude</div>
        </div>
      </div>
      <div class="last-updated">Updated: <span>{{LAST_UPDATED}}</span></div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">Your AI Intelligence Feed</div>
    <h2 class="hero-title">6 Sections · 5 Stories Each</h2>
    <p class="hero-sub">Click any headline to read the full summary and impact analysis.</p>
  </div>

  <main>
    <div class="sections-grid">
      {{SECTIONS_HTML}}
    </div>
  </main>

  <footer>AI Pulse &mdash; Powered by Claude &amp; GitHub Actions &mdash; Refreshed every 15 days</footer>

</body>
</html>
