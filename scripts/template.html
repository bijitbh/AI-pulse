<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Pulse — Top 10 AI News</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161b27;
      --surface-hover: #1e2535;
      --border: #2a3248;
      --accent: #4f8ef7;
      --accent-dim: #2d5ab8;
      --text: #e2e8f0;
      --text-muted: #8896b0;
      --tag-eng: #1a3a2a;
      --tag-eng-text: #4ade80;
      --tag-fin: #1a2e3a;
      --tag-fin-text: #38bdf8;
      --tag-ai: #2a1a3a;
      --tag-ai-text: #c084fc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 0 20px;
      background: linear-gradient(180deg, #0a0d18 0%, var(--bg) 100%);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo .tagline {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .last-updated {
      font-size: 12px;
      color: var(--text-muted);
    }

    .last-updated span {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Refresh Button ── */
    #refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      color: #fff;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #refresh-btn:hover { background: var(--accent); }
    #refresh-btn:active { transform: scale(0.97); }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .refresh-icon { font-size: 15px; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.visible { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      margin: 16px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal-error {
      font-size: 12px;
      color: #f87171;
      margin-bottom: 12px;
      min-height: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      background: var(--accent-dim);
      color: #fff;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--accent); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      max-width: 340px;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: #22c55e; }
    .toast.error { border-color: #f87171; }

    /* ── Main ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .section-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section-header .divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── News Cards ── */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .news-card:hover {
      border-color: var(--accent-dim);
      background: var(--surface-hover);
    }

    .card-rank {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 28px;
      font-weight: 800;
      color: var(--border);
      line-height: 1;
      user-select: none;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-engineering { background: var(--tag-eng); color: var(--tag-eng-text); }
    .tag-finance { background: var(--tag-fin); color: var(--tag-fin-text); }
    .tag-ai { background: var(--tag-ai); color: var(--tag-ai-text); }

    .card-headline {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
      padding-right: 40px;
    }

    .card-headline a { color: var(--text); }
    .card-headline a:hover { color: var(--accent); text-decoration: none; }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card-meta .source { font-weight: 600; color: var(--accent); }

    .card-summary {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .card-takeaways h4 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-takeaways ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-takeaways li {
      font-size: 13px;
      color: var(--text);
      padding-left: 18px;
      position: relative;
      line-height: 1.5;
    }

    .card-takeaways li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 12px;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .card-rank { font-size: 20px; top: 16px; right: 16px; }
      .news-card { padding: 18px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>AI Pulse</h1>
          <div class="tagline">Top 10 AI stories — curated by Claude</div>
        </div>
      </div>
      <div class="header-meta">
        <div class="last-updated">
          Last updated: <span id="last-updated-time">{{LAST_UPDATED}}</span>
        </div>
        <button id="refresh-btn">
          <span class="refresh-icon">↻</span> Refresh News
        </button>
      </div>
    </div>
  </header>

  <!-- Password Modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2>Refresh AI Pulse</h2>
      <p>Enter the admin password to trigger a news refresh. This will fetch the latest AI stories and may take 1–2 minutes.</p>
      <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
      <div class="modal-error" id="modal-error"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Trigger Refresh</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <main>
    <div class="section-header">
      <h2>Today's Top 10</h2>
      <div class="divider"></div>
    </div>

    <div class="news-list" id="news-list">
      {{NEWS_ITEMS}}
    </div>
  </main>

  <footer>
    AI Pulse &mdash; Powered by Claude &amp; GitHub Actions
  </footer>

  <script>
    // ── Config (injected at build time) ──
    const CONFIG = {
      passwordHash: "{{PASSWORD_HASH}}",
      repoOwner: "{{REPO_OWNER}}",
      repoName: "{{REPO_NAME}}",
      workflowId: "{{WORKFLOW_ID}}",
      branch: "{{BRANCH}}",
      pat: "{{WORKFLOW_PAT}}"
    };

    // ── SHA-256 helper ──
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    // ── Modal ──
    const modal = document.getElementById('modal');
    const passwordInput = document.getElementById('password-input');
    const modalError = document.getElementById('modal-error');
    const refreshBtn = document.getElementById('refresh-btn');
    const confirmBtn = document.getElementById('modal-confirm');
    const cancelBtn = document.getElementById('modal-cancel');

    refreshBtn.addEventListener('click', () => {
      passwordInput.value = '';
      modalError.textContent = '';
      modal.classList.add('visible');
      setTimeout(() => passwordInput.focus(), 100);
    });

    cancelBtn.addEventListener('click', () => modal.classList.remove('visible'));

    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('visible');
    });

    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') confirmBtn.click();
    });

    confirmBtn.addEventListener('click', async () => {
      const entered = passwordInput.value.trim();
      if (!entered) { modalError.textContent = 'Please enter the password.'; return; }

      const hash = await sha256(entered);
      if (hash !== CONFIG.passwordHash) {
        modalError.textContent = 'Incorrect password. Please try again.';
        passwordInput.value = '';
        passwordInput.focus();
        return;
      }

      modal.classList.remove('visible');
      await triggerRefresh();
    });

    // ── Trigger GitHub Actions workflow ──
    async function triggerRefresh() {
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<span class="refresh-icon">⟳</span> Triggering...';

      try {
        const res = await fetch(
          `https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/actions/workflows/${CONFIG.workflowId}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${CONFIG.pat}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ ref: CONFIG.branch })
          }
        );

        if (res.status === 204) {
          showToast('✓ Refresh triggered! The site will update in 1–2 minutes. Reload the page after that.', 'success', 8000);
        } else {
          const err = await res.json().catch(() => ({}));
          showToast(`Error: ${err.message || 'Failed to trigger workflow (status ' + res.status + ')'}`, 'error', 6000);
        }
      } catch (e) {
        showToast('Network error. Please check your connection and try again.', 'error', 5000);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.innerHTML = '<span class="refresh-icon">↻</span> Refresh News';
      }
    }

    // ── Toast ──
    function showToast(message, type = '', duration = 4000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
    }
  </script>
</body>
</html>
