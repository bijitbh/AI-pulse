<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{SECTION_TITLE}} — AI Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #0d0f14;
      --surface:      #161b27;
      --surface-hover:#1c2235;
      --border:       #2a3248;
      --text:         #e2e8f0;
      --text-muted:   #8896b0;
      --accent:       {{SECTION_COLOR}};
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      background: rgba(13,15,20,0.85);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: color 0.15s, border-color 0.15s;
    }

    .back-link:hover { color: var(--text); border-color: var(--text-muted); text-decoration: none; }

    .section-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .badge-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    .last-updated { font-size: 11px; color: var(--text-muted); }
    .last-updated span { color: var(--text); font-weight: 600; }

    /* ── Page Hero ── */
    .page-hero {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .hero-icon {
      font-size: 52px;
      line-height: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 0 16px color-mix(in srgb, var(--accent) 50%, transparent));
    }

    .hero-text {}

    .hero-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .hero-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .hero-desc {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ── Articles ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    .articles-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      position: relative;
      transition: background 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }

    /* Left accent bar */
    .article-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 16px 0 0 16px;
    }

    .article-card:hover {
      background: var(--surface-hover);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .article-number {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 40px;
      font-weight: 800;
      color: color-mix(in srgb, var(--accent) 12%, transparent);
      line-height: 1;
      user-select: none;
      font-variant-numeric: tabular-nums;
    }

    .article-title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 10px;
      padding-right: 56px;
    }

    .article-title a { color: var(--text); transition: color 0.15s; }
    .article-title a:hover { color: var(--accent); text-decoration: none; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .source-favicon {
      border-radius: 3px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    .article-source {
      font-weight: 700;
      color: var(--accent);
    }

    .meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .article-summary {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .article-impact {
      background: color-mix(in srgb, var(--accent) 6%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
      border-radius: 10px;
      padding: 14px 16px;
    }

    .article-impact h4 {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .article-impact ul { list-style: none; display: flex; flex-direction: column; gap: 7px; }

    .article-impact li {
      font-size: 13px;
      color: var(--text);
      padding-left: 18px;
      position: relative;
      line-height: 1.5;
    }

    .article-impact li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .article-number { font-size: 28px; }
      .article-card { padding: 20px; }
      .hero-title { font-size: 22px; }
      .hero-icon { font-size: 36px; }
      .page-hero { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <a class="back-link" href="../index.html">← AI Pulse</a>
        <div class="section-badge">
          <span class="badge-dot"></span>
          {{SECTION_TITLE}}
        </div>
      </div>
      <div class="last-updated">Updated: <span>{{LAST_UPDATED}}</span></div>
    </div>
  </header>

  <div class="page-hero">
    <div class="hero-icon">{{SECTION_ICON}}</div>
    <div class="hero-text">
      <div class="hero-label">Section Deep Dive</div>
      <h1 class="hero-title">{{SECTION_TITLE}}</h1>
      <p class="hero-desc">{{SECTION_DESCRIPTION}}</p>
    </div>
  </div>

  <main>
    <div class="articles-list">
      {{ARTICLES_HTML}}
    </div>
  </main>

  <footer>AI Pulse &mdash; Powered by Claude &amp; GitHub Actions &mdash; Refreshed every 15 days</footer>

</body>
</html>
