<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Pulse — AI News by Section</title>
  <style>
    :root { --bg: #0d0f14; --text: #e2e8f0; --text-muted: #8896b0; --border: #2a3248; --accent: #4f8ef7; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .empty-state { text-align: center; padding: 80px 24px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="empty-state">
    <div class="icon">⚡</div>
    <h1>AI Pulse</h1>
    <p>No stories yet — the site will populate on the next scheduled run (1st and 16th of each month).<br>You can also trigger it manually from the GitHub Actions tab.</p>
  </div>
</body>
</html>
